name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_APP_URL: http://localhost:2000
          VITE_APP_front_end_url: http://localhost:5173

  backend:
    name: Backend dependency check
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 }).ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Auth unit checks (JWT / bcrypt shape)
        run: npm run test:auth:unit

      - name: Auth integration (Mongo + Redis + HTTP)
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/piperchat_ci_auth
          ACCESS_TOKEN: ci-test-jwt-secret-do-not-use-in-production-32chars-min
          DEFAULT_PROFILE_PIC: https://example.com/default.png
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:auth
